<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=0.9, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Evaporators">
<meta name="theme-color" content="#004d40">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Evaporator Field Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">

<style>

:root {
    --teal-dark:   #00695c;
    --teal-mid:    #00897b;
    --teal-header: #004d40;
    --navy:        #01579b;
    --navy-header: #003466;
    --gold:        #f9a825;
    --gold-light:  #fff8e1;
    --green-auto:  #c8e6c9;
    --red-clear:   #c62828;
    --hatch-dark:  #9e9e9e;
    --hatch-light: #bdbdbd;
    --bg:          #f5f5f0;
    --border:      #b2b2b2;
    --text:        #1a1a1a;
    --keypad-bg:   #2e2e2e;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    font-family: 'Source Serif 4', Georgia, serif;
    margin: 0;
    padding: 14px 10px 240px 10px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 13px;
    color: var(--text);
}

.page-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: white;
    text-align: center;
    background: linear-gradient(135deg, var(--teal-header) 0%, var(--teal-mid) 100%);
    width: 100%;
    max-width: 420px;
    margin: 4px 0 14px 0;
    padding: 14px 12px;
    border-radius: 8px;
    box-shadow: 0 3px 10px rgba(0, 77, 64, 0.35);
}

.section-label {
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: white;
    background: var(--teal-header);
    padding: 6px 12px;
    border-radius: 4px 4px 0 0;
    width: 100%;
    max-width: 420px;
    margin-bottom: 0;
    margin-top: 10px;
    text-align: center;
}

.section-label.navy { background: var(--navy-header); }

table {
    width: 100%;
    max-width: 420px;
    border-collapse: collapse;
    margin-bottom: 0;
    border: 1.5px solid var(--border);
    border-top: none;
}

th {
    background: var(--teal-mid);
    color: white;
    text-transform: uppercase;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 7px 3px;
    border: 1px solid var(--teal-dark);
    text-align: center;
}

table.navy-table th {
    background: var(--navy);
    border-color: var(--navy-header);
}

td {
    border: 1px solid var(--border);
    text-align: center;
    padding: 3px 2px;
    font-size: 12px;
    font-family: 'Source Code Pro', monospace;
}

tr:nth-child(even) td { background: rgba(0,0,0,0.025); }

input {
    width: 52px;
    height: 30px;
    font-size: 13px;
    font-family: 'Source Code Pro', monospace;
    text-align: center;
    text-transform: uppercase;
    border: none;
    background: transparent;
    outline: none;
    color: var(--text);
}

input.active-input {
    background: var(--gold-light);
    border-radius: 3px;
    box-shadow: 0 0 0 2px var(--gold);
}

.auto {
    background: var(--green-auto) !important;
    font-weight: 700;
    font-family: 'Source Code Pro', monospace;
    color: #1b5e20;
}

.result-cell {
    background: var(--gold-light) !important;
    font-weight: 700;
    font-family: 'Source Code Pro', monospace;
    font-size: 14px;
    color: #5d3a00;
}

.hatched {
    background-image: repeating-linear-gradient(
        45deg,
        var(--hatch-dark) 0px,
        var(--hatch-dark) 2px,
        var(--hatch-light) 2px,
        var(--hatch-light) 8px
    ) !important;
    pointer-events: none;
}

.mode-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 8px 0 6px 0;
    width: 100%;
    max-width: 420px;
}

.mode-btn {
    flex: 1;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 9px 8px;
    border: 2px solid var(--navy);
    background: white;
    color: var(--navy);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
}

.mode-btn.active { background: var(--navy); color: white; }

.divider {
    width: 100%;
    max-width: 420px;
    border: none;
    border-top: 2px solid #ccc;
    margin: 18px 0 4px 0;
}

#toast {
    position: fixed;
    top: 0;
    left: 0;
    background: rgba(0,0,0,0.28);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    color: rgba(255,255,255,0.88);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 20px;
    white-space: nowrap;
    z-index: 1001;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
}

#toast.show { opacity: 1; }

#confirmOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: 2000;
    align-items: center;
    justify-content: center;
}

#confirmOverlay.visible { display: flex; }

#confirmBox {
    background: white;
    border-radius: 14px;
    padding: 28px 24px 20px 24px;
    max-width: 300px;
    width: 88%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}

#confirmBox h3 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text);
    margin: 0 0 8px 0;
}

#confirmBox p {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 12px;
    color: #666;
    margin: 0 0 20px 0;
    line-height: 1.5;
}

.confirm-btns { display: flex; gap: 10px; }

.confirm-btns button {
    flex: 1;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 11px 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#confirmCancel { background: #eeeeee; color: #444; }
#confirmYes { background: var(--red-clear); color: white; }

#floatingKeypad {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--keypad-bg);
    border-top: 3px solid var(--teal-mid);
    padding: 7px 10px 10px 10px;
    z-index: 999;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.3);
}

#keypadGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    max-width: 420px;
    margin: 0 auto;
}

.key {
    font-family: 'Source Code Pro', monospace;
    font-size: 19px;
    font-weight: 500;
    padding: 9px;
    background: #4a4a4a;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.key:active { background: #777; }

#bottomRow {
    display: flex;
    gap: 6px;
    max-width: 420px;
    margin: 6px auto 0 auto;
}

#clearAllBtn {
    flex: 1;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px;
    background: var(--red-clear);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

#micBtn {
    width: 52px;
    font-size: 20px;
    padding: 7px;
    background: #3a3a3a;
    color: white;
    border: 2px solid #555;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
}

#micBtn.listening {
    background: #b71c1c;
    border-color: #ef5350;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(239,83,80,0.6); }
    70%  { box-shadow: 0 0 0 8px rgba(239,83,80,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,83,80,0); }
}

</style>
</head>
<body>

<div id="toast"></div>

<div id="confirmOverlay">
    <div id="confirmBox">
        <h3>Clear All Data?</h3>
        <p>This will erase all entered values. This cannot be undone.</p>
        <div class="confirm-btns">
            <button id="confirmCancel" onclick="dismissConfirm()">Cancel</button>
            <button id="confirmYes" onclick="confirmClear()">Yes, Clear</button>
        </div>
    </div>
</div>

<div class="page-title">Evaporator Field Sheet</div>

<div class="section-label navy">Consistency &amp; TSS Calculator</div>

<div class="mode-row">
    <button class="mode-btn active" id="btnConsistency" onclick="setMode('consistency')">Consistency %</button>
    <button class="mode-btn" id="btnTSS" onclick="setMode('tss')">TSS (ppm)</button>
</div>

<table class="navy-table">
    <tr>
        <th colspan="2">Input</th>
        <th colspan="2">Result</th>
    </tr>
    <tr>
        <td>Dry Weight</td>
        <td><input readonly id="dryWeight" onclick="selectInput(this,'Dry Weight')"></td>
        <td rowspan="2" style="font-weight:700;font-size:11px;letter-spacing:0.04em;text-align:center;" id="resultLabel">CONSISTENCY %</td>
        <td rowspan="2" class="result-cell" id="calcResult">—</td>
    </tr>
    <tr>
        <td>Cup Weight</td>
        <td><input readonly id="cupWeight" onclick="selectInput(this,'Cup Weight')"></td>
    </tr>
    <tr>
        <td id="wetWeightLabel">Wet Weight</td>
        <td id="wetWeightCell"><input readonly id="wetWeight" onclick="selectInput(this,'Wet Weight')"></td>
    </tr>
</table>

<hr class="divider">

<div class="section-label">Evaporator Sample Sheet</div>

<table>
<tr>
<th>Unit</th>
<th>Temp</th>
<th>BM</th>
<th>Solids %</th>
<th>pH</th>
</tr>
<tbody id="tableBody"></tbody>
</table>

<div id="floatingKeypad">
    <div id="keypadGrid">
        <button class="key" onclick="addNumber('1')">1</button>
        <button class="key" onclick="addNumber('2')">2</button>
        <button class="key" onclick="addNumber('3')">3</button>
        <button class="key" onclick="addNumber('4')">4</button>
        <button class="key" onclick="addNumber('5')">5</button>
        <button class="key" onclick="addNumber('6')">6</button>
        <button class="key" onclick="addNumber('7')">7</button>
        <button class="key" onclick="addNumber('8')">8</button>
        <button class="key" onclick="addNumber('9')">9</button>
        <button class="key" onclick="addNumber('.')">.</button>
        <button class="key" onclick="addNumber('0')">0</button>
        <button class="key" onclick="backspace()">⌫</button>
    </div>
    <div id="bottomRow">
        <button id="clearAllBtn" onclick="askConfirm()">Clear All</button>
        <button id="micBtn" onclick="toggleMic()" title="Voice input">🎤</button>
    </div>
</div>

<script>

let activeInput = null;
let currentMode = 'consistency';
let toastTimer  = null;

function showToast(msg, anchorEl, forceDir) {
    const kh = document.getElementById('floatingKeypad').offsetHeight;
    document.documentElement.style.setProperty('--kh', kh + 'px');
    const t = document.getElementById('toast');
    t.textContent = msg;
    // Reset any previous inline transform
    t.style.transform = '';

    if (anchorEl) {
        const rect = anchorEl.getBoundingClientRect();
        const tW = 190; // approx toast width
        const tH = 34;  // approx toast height
        const margin = 10;

        // Decide direction: forced 'below', near-top auto-side, or default above
        if (forceDir === 'below') {
            // Show just below the button, centred on it
            let left = rect.left + rect.width / 2 - tW / 2;
            left = Math.max(margin, Math.min(left, window.innerWidth - tW - margin));
            t.style.top  = (rect.bottom + 8) + 'px';
            t.style.left = left + 'px';

        } else if (rect.top < 130) {
            // Near top — show to the right, or left if no room
            let left = rect.right + margin;
            if (left + tW > window.innerWidth - margin) {
                left = rect.left - tW - margin;
            }
            left = Math.max(margin, left);
            t.style.top  = Math.max(8, rect.top + rect.height / 2 - tH / 2) + 'px';
            t.style.left = left + 'px';

        } else {
            // Normal — just above the tapped cell, horizontally centred
            let left = rect.left + rect.width / 2 - tW / 2;
            left = Math.max(margin, Math.min(left, window.innerWidth - tW - margin));
            t.style.top  = (rect.top - tH - 8) + 'px';
            t.style.left = left + 'px';
        }
    } else {
        // Fallback — centre top
        t.style.top  = '20px';
        t.style.left = '50%';
        t.style.transform = 'translateX(-50%)';
    }

    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
        t.classList.remove('show');
        t.style.transform = '';
    }, 1800);
}

function askConfirm() {
    document.getElementById('confirmOverlay').classList.add('visible');
}

function dismissConfirm() {
    document.getElementById('confirmOverlay').classList.remove('visible');
}

function confirmClear() {
    dismissConfirm();
    if (activeInput) activeInput.classList.remove('active-input');
    activeInput = null;
    document.querySelectorAll("input").forEach(i => i.value = "");
    autoRows.forEach(r => { const s = document.getElementById(`solids-${r}`); if(s) s.textContent = "—"; });
    document.getElementById('calcResult').textContent = "—";
    showToast('All fields cleared');
}

document.getElementById('confirmOverlay').addEventListener('click', function(e) {
    if (e.target === this) dismissConfirm();
});

function setMode(mode) {
    currentMode = mode;
    const wetCell = document.getElementById('wetWeightCell');
    const wetLabel = document.getElementById('wetWeightLabel');
    const resultLabel = document.getElementById('resultLabel');
    if (mode === 'tss') {
        wetCell.className = 'hatched';
        wetLabel.className = 'hatched';
        document.getElementById('wetWeight').value = '';
        resultLabel.textContent = 'TSS (PPM)';
        const btn = document.getElementById('btnTSS');
        btn.classList.add('active');
        document.getElementById('btnConsistency').classList.remove('active');
        showToast('TSS Mode — 30ml fixed', btn, 'below');
    } else {
        wetCell.className = '';
        wetLabel.className = '';
        resultLabel.textContent = 'CONSISTENCY %';
        const btn = document.getElementById('btnConsistency');
        btn.classList.add('active');
        document.getElementById('btnTSS').classList.remove('active');
        showToast('Consistency Mode', btn, 'below');
    }
    recalc();
}

function recalc() {
    const dry = parseFloat(document.getElementById('dryWeight').value);
    const cup = parseFloat(document.getElementById('cupWeight').value);
    const wet = parseFloat(document.getElementById('wetWeight').value);
    const rc  = document.getElementById('calcResult');
    if (currentMode === 'consistency') {
        rc.textContent = (!isNaN(dry) && !isNaN(cup) && !isNaN(wet) && wet !== 0)
            ? (((dry - cup) / wet) * 100).toFixed(2) : '—';
    } else {
        rc.textContent = (!isNaN(dry) && !isNaN(cup))
            ? Math.round(((dry - cup) / 30) * 1e6).toLocaleString() : '—';
    }
}

const autoRows = ["F","A","E","B","D","C","H","G","WL"];
let html = "";

["F","A","E","B","D","C","H","G"].forEach(unit => {
    html += `<tr>
        <td><strong>${unit}</strong></td>
        <td><input readonly onclick="selectInput(this,'${unit} — Temp')" data-row="${unit}" data-col="temp"></td>
        <td><input readonly onclick="selectInput(this,'${unit} — BM')" data-row="${unit}" data-col="bm"></td>
        <td class="auto" id="solids-${unit}">—</td>
        <td class="hatched"></td>
    </tr>`;
});

html += `<tr>
    <td><strong>W.L.</strong></td>
    <td><input readonly onclick="selectInput(this,'W.L. — Temp')" data-row="WL" data-col="temp"></td>
    <td><input readonly onclick="selectInput(this,'W.L. — BM')" data-row="WL" data-col="bm"></td>
    <td class="auto" id="solids-WL">—</td>
    <td><input readonly onclick="selectInput(this,'W.L. — pH')"></td>
</tr>`;

html += `<tr>
    <td><strong>C.C.A.</strong></td>
    <td class="hatched"></td>
    <td class="hatched"></td>
    <td class="hatched"></td>
    <td><input readonly onclick="selectInput(this,'C.C.A. — pH')"></td>
</tr>`;

html += `<tr>
    <td><strong>H.L.</strong></td>
    <td><input readonly onclick="selectInput(this,'H.L. — Temp')"></td>
    <td class="hatched"></td>
    <td class="hatched"></td>
    <td class="hatched"></td>
</tr>`;

document.getElementById("tableBody").innerHTML = html;

function updatePadding() {
    const kh = document.getElementById('floatingKeypad').offsetHeight;
    document.body.style.paddingBottom = (kh + 20) + 'px';
    document.documentElement.style.setProperty('--kh', kh + 'px');
}
window.addEventListener('load', updatePadding);
window.addEventListener('resize', updatePadding);

function calcSolids(bm, temp) {
    return -3.302 + 1.65056*bm + 0.06643*temp
         - 0.003041*(bm*bm) + 0.000489*(temp*temp)
         - 0.001332*bm*temp;
}

function updateSolids(row) {
    const t = document.querySelector(`input[data-row="${row}"][data-col="temp"]`);
    const b = document.querySelector(`input[data-row="${row}"][data-col="bm"]`);
    const s = document.getElementById(`solids-${row}`);
    const temp = parseFloat(t.value), bm = parseFloat(b.value);
    s.textContent = (!isNaN(temp) && !isNaN(bm)) ? calcSolids(bm, temp).toFixed(1) : '—';
}

// ---- LONG PRESS DETECTION ----
let longPressTimer = null;
const LONG_PRESS_MS = 250; // 250ms — quick hold to trigger mic

function attachLongPress(input, label) {
    let didLongPress = false;

    // touchstart — begin timer for long press
    input.addEventListener('touchstart', (e) => {
        didLongPress = false;
        longPressTimer = setTimeout(() => {
            didLongPress = true;
            longPressTimer = null;
            // Select the cell
            selectInput(input, label);
            // Vibrate feedback
            if (navigator.vibrate) navigator.vibrate(30);
            // Start mic immediately
            startMic();
        }, LONG_PRESS_MS);
    }, { passive: true });

    // touchend — if short tap (no long press), just select cell for manual entry
    input.addEventListener('touchend', () => {
        if (longPressTimer) {
            clearTimeout(longPressTimer);
            longPressTimer = null;
            // Short tap — select cell for manual keypad use
            selectInput(input, label);
        }
        // If long press already fired, do nothing extra
    });

    // touchmove — cancel long press if finger moves
    input.addEventListener('touchmove', () => {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    });
}

function attachLongPressToAll() {
    // Static inputs (top calculator table)
    [
        { id: 'dryWeight', label: 'Dry Weight' },
        { id: 'cupWeight', label: 'Cup Weight' },
        { id: 'wetWeight', label: 'Wet Weight' }
    ].forEach(({ id, label }) => {
        const el = document.getElementById(id);
        if (el) attachLongPress(el, label);
    });

    // Dynamic evaporator table inputs
    document.querySelectorAll('#tableBody input').forEach(input => {
        const row = input.getAttribute('data-row');
        const col = input.getAttribute('data-col');
        // Build a readable label for the toast
        const rowLabel = row === 'WL' ? 'W.L.' : row;
        const colLabel = col ? col.charAt(0).toUpperCase() + col.slice(1) : 'pH';
        attachLongPress(input, rowLabel + ' — ' + colLabel);
    });
}

function selectInput(input, label) {
    if (activeInput) activeInput.classList.remove('active-input');
    activeInput = input;
    activeInput.classList.add('active-input');
    setTimeout(() => {
        const kh = document.getElementById('floatingKeypad').offsetHeight;
        const rect = input.getBoundingClientRect();
        const clearance = window.innerHeight - kh - 16;
        if (rect.bottom > clearance) {
            window.scrollBy({ top: rect.bottom - clearance, behavior: 'smooth' });
        }
    }, 60);
    showToast(label, input);
}

function addNumber(n) {
    if (!activeInput) { showToast('Tap a cell first'); return; }
    activeInput.value += n;
    if (['dryWeight','cupWeight','wetWeight'].includes(activeInput.id)) { recalc(); return; }
    const row = activeInput.getAttribute("data-row");
    const col = activeInput.getAttribute("data-col");
    if (row && (col === "temp" || col === "bm")) updateSolids(row);
}

function backspace() {
    if (!activeInput) return;
    activeInput.value = activeInput.value.slice(0, -1);
    if (['dryWeight','cupWeight','wetWeight'].includes(activeInput.id)) { recalc(); return; }
    const row = activeInput.getAttribute("data-row");
    const col = activeInput.getAttribute("data-col");
    if (row && (col === "temp" || col === "bm")) updateSolids(row);
}

window.addEventListener('load', () => {
    attachLongPressToAll();
    loadSavedData();
    setTimeout(() => showToast('Hold any cell for voice input'), 700);
});

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
    });
}

// ---- AUTO-SAVE TO localStorage ----
function saveData() {
    const data = {};
    document.querySelectorAll('input').forEach(input => {
        const key = input.id || (input.getAttribute('data-row') + '_' + input.getAttribute('data-col'));
        if (key && key !== 'null_null') data[key] = input.value;
    });
    data['__mode__'] = currentMode;
    localStorage.setItem('evap_data', JSON.stringify(data));
}

function loadSavedData() {
    const raw = localStorage.getItem('evap_data');
    if (!raw) return;
    try {
        const data = JSON.parse(raw);
        // Restore mode first
        if (data['__mode__'] && data['__mode__'] !== currentMode) {
            setMode(data['__mode__']);
        }
        document.querySelectorAll('input').forEach(input => {
            const key = input.id || (input.getAttribute('data-row') + '_' + input.getAttribute('data-col'));
            if (key && key !== 'null_null' && data[key] !== undefined) {
                input.value = data[key];
            }
        });
        // Recalculate all solids
        autoRows.forEach(row => {
            const t = document.querySelector(`input[data-row="${row}"][data-col="temp"]`);
            const b = document.querySelector(`input[data-row="${row}"][data-col="bm"]`);
            if (t && b && t.value && b.value) updateSolids(row);
        });
        recalc();
        showToast('Data restored');
    } catch(e) {}
}

// Hook save into addNumber and backspace
const _origAddNumber = addNumber;
const _origBackspace  = backspace;

function addNumber(n) {
    if (!activeInput) { showToast('Tap a cell first'); return; }
    activeInput.value += n;
    if (['dryWeight','cupWeight','wetWeight'].includes(activeInput.id)) { recalc(); saveData(); return; }
    const row = activeInput.getAttribute("data-row");
    const col = activeInput.getAttribute("data-col");
    if (row && (col === "temp" || col === "bm")) updateSolids(row);
    saveData();
}

function backspace() {
    if (!activeInput) return;
    activeInput.value = activeInput.value.slice(0, -1);
    if (['dryWeight','cupWeight','wetWeight'].includes(activeInput.id)) { recalc(); saveData(); return; }
    const row = activeInput.getAttribute("data-row");
    const col = activeInput.getAttribute("data-col");
    if (row && (col === "temp" || col === "bm")) updateSolids(row);
    saveData();
}

// Also save on clear
const _origConfirmClear = confirmClear;
function confirmClear() {
    dismissConfirm();
    if (activeInput) activeInput.classList.remove('active-input');
    activeInput = null;
    document.querySelectorAll("input").forEach(i => i.value = "");
    autoRows.forEach(r => { const s = document.getElementById(`solids-${r}`); if(s) s.textContent = "—"; });
    document.getElementById('calcResult').textContent = "—";
    localStorage.removeItem('evap_data');
    showToast('All fields cleared');
}

// ---- VOICE INPUT ----
let recognition = null;
let isListening  = false;

function toggleMic() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        showToast('Voice not supported on this browser');
        return;
    }
    if (!activeInput) {
        showToast('Tap a cell first');
        return;
    }
    if (isListening) {
        stopMic();
    } else {
        startMic();
    }
}

function startMic() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        showToast('Voice not supported');
        return;
    }
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    // interimResults: true — grabs number the moment it hears it, no waiting
    recognition.interimResults = true;
    // maxAlternatives: gives us best guess even in noisy environments
    recognition.maxAlternatives = 3;

    let resultCommitted = false; // prevent double-firing

recognition.onstart = () => {
        isListening = true;
        resultCommitted = false;
        document.getElementById('micBtn').classList.add('listening');
        document.getElementById('micBtn').textContent = '🔴';
        showToast('🎤 Say a number...', activeInput, 'above');
        // Auto-stop after 2 seconds — cuts delay after speaking
        setTimeout(() => { if (isListening && recognition) { try { recognition.stop(); } catch(e) {} } }, 2000);
    };

    recognition.onresult = (e) => {
        if (resultCommitted) return;

        // Loop through results — grab first final result or best interim
        for (let i = 0; i < e.results.length; i++) {
            const result = e.results[i];
            const transcript = result[0].transcript.trim();

            // Try all alternatives for a clean number
            let cleaned = '';
            for (let j = 0; j < result.length; j++) {
                const alt = result[j].transcript.trim().replace(/[^0-9.]/g, '');
                if (alt) { cleaned = alt; break; }
            }

            if (cleaned) {
                // Final confident result — write it and stop immediately
                resultCommitted = true;
                if (activeInput) {
                    activeInput.value = cleaned;
                    if (['dryWeight','cupWeight','wetWeight'].includes(activeInput.id)) { recalc(); }
                    const row = activeInput.getAttribute("data-row");
                    const col = activeInput.getAttribute("data-col");
                    if (row && (col === "temp" || col === "bm")) updateSolids(row);
                    saveData();
                    showToast('✓ ' + cleaned, activeInput);
                }
                // Stop mic the moment we have the number
                stopMic();
                return;
            }
        }
    };

    recognition.onerror = (e) => {
        if (e.error === 'no-speech') {
            showToast('No speech detected');
        } else if (e.error === 'not-allowed') {
            showToast('Mic permission denied');
        } else {
            showToast('Try again');
        }
        stopMic();
    };

    recognition.onend = () => {
        stopMic();
    };

    recognition.start();
}

function stopMic() {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micBtn').textContent = '🎤';
    if (recognition) {
        try { recognition.stop(); } catch(e) {}
        recognition = null;
    }
}
